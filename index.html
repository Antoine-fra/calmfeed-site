<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#101830">
<title>Feed — Bien-être numérique</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: linear-gradient(180deg, #232a54 0%, #10162a 100%);
    color: #f5f6fa;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .container { max-width: 720px; margin: 0 auto; padding: 64px 24px; }
  .hero { text-align: center; padding: 56px 0 40px; }
  .logo {
    width: 92px; height: 92px; margin: 0 auto 28px;
    border-radius: 22px;
    background: radial-gradient(circle at center, #fff 0 4px, transparent 5px),
                radial-gradient(circle at center, transparent 0 18px, rgba(255,255,255,0.85) 18px 21px, transparent 22px),
                radial-gradient(circle at center, transparent 0 30px, rgba(255,255,255,0.5) 30px 33px, transparent 34px),
                linear-gradient(180deg, #2a3258 0%, #101830 100%);
    box-shadow: 0 8px 32px rgba(0,0,0,0.45);
  }
  h1 { font-size: 38px; font-weight: 700; letter-spacing: -0.02em; }
  .tagline { font-size: 17px; opacity: 0.7; margin-top: 10px; }
  .links { display: flex; justify-content: center; gap: 14px; margin-top: 32px; flex-wrap: wrap; }
  .links a {
    color: #f5f6fa; text-decoration: none;
    padding: 11px 22px; border-radius: 12px;
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
    font-size: 15px; font-weight: 500;
    transition: background 0.2s ease;
  }
  .links a:hover { background: rgba(255,255,255,0.14); }
  footer { text-align: center; padding: 40px 0 20px; font-size: 13px; opacity: 0.4; }
</style>
</head>
<body>
<div class="container">
  <div class="hero">
    <div class="logo" aria-hidden="true"></div>
    <h1>Feed</h1>
    <p class="tagline">Votre fil social, sans distractions.</p>
    <div class="links">
      <a href="/privacy.html">Politique de confidentialité</a>
      <a href="/support.html">Support</a>
    </div>
  </div>
</div>
<footer>© 2026 Feed</footer>
</body>
</html>
